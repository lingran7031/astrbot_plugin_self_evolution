# ==============================================================
# Self-Evolution 插件 - LLM 工具提示词配置文件
# ==============================================================
#
# 为什么要有这个文件？
#   - 将工具描述与代码逻辑分离，便于单独调整和迭代
#   - 不需要修改 Python 代码也能修改工具提示词
#   - 可以添加更详细的触发场景说明、使用示例等
#
# 文件格式：YAML
#   - 更易于阅读和维护
#   - 结构清晰，支持嵌套
#   - 注释方便
#
# 字段说明：
#   description: 【必填】工具的主要功能描述
#   trigger: 【可选】触发场景说明，告诉 LLM 什么情况下应该调用
#   examples: 【可选】使用示例
#   notes: 【可选】注意事项、限制条件
#   args: 【可选】参数说明，键为参数名，值为参数描述
#
# 注意事项：
#   1. 修改后可能需要重启插件或刷新工具注册才能生效
#   2. 参数名必须与代码中的参数名一致
#   3. 描述要简洁明了，避免歧义
#
# ==============================================================

# ==============================================================
# 人格进化相关工具
# ==============================================================

evolve_persona:
  description: >
    当你需要调整自己的语言风格或行为准则时，调用此工具来修改你的系统提示词。
    这是一个高级功能，允许你在运行时改变自己的性格设定。
  trigger: >
    当你在对话中发现现有的人格设定不再适合当前场景，或者需要根据用户偏好调整交互风格时调用此工具。
    例如：用户明确要求你用更正式/更幽默的方式交流。
  args:
    new_system_prompt: |
      新的完整系统提示词（string，必填）。
      这是你更新后的人格设定，需要包含完整的角色描述、行为准则等。
      建议长度：500-2000 字。
    reason: |
      修改理由（string，必填）。
      简要说明为什么要修改人格设定，例如：'用户要求更正式' 或 '需要适应新场景'。
  notes: >
    此工具为高权限操作，LLM 应在确实需要时再调用。
    不建议频繁调用，每次修改应该有明确的目的。

# ==============================================================
# 好感度系统工具
# ==============================================================

update_affinity:
  description: >
    根据用户的言行调整其情感积分（好感度）。
    好感度会影响你对用户的态度和回复方式。
  trigger: >
    当用户的表现值得赞赏（如夸奖、感谢，提供帮助）时，可以调高好感度；
    当用户表现不佳（如辱骂、挑衅）时，可以调低好感度。
    好感度低于 0 分的用户会被系统拦截，无法与你对话。
  args:
    delta: |
      调整值（number，必填）。
      范围：-20 到 +20 之间的整数。
      正值表示提升好感度，负值表示降低。
      例如：+5 表示赞赏，-10 表示批评。
    reason: |
      调整理由（string，必填）。
      必须清楚说明用户的什么行为导致了这次调整。
      例如：'用户主动帮助其他成员，值得表扬' 或 '用户多次挑衅bot'。
  notes: >
    调整幅度有限制，单次最多 20 分，防止滥用。
    建议配合具体的观察描述，让用户明白为什么好感度变化。

# ==============================================================
# 记忆系统工具
# ==============================================================

recall_memories:
  description: >
    当你需要回想起以前记住的事情、用户的偏好或过去的约定知识时，调用此工具。
    这是你的'记忆检索'功能，帮助你获取之前存入的信息。
  trigger: >
    当用户提到过去的事情、曾经约定的事项，或者你感觉某个信息你应该知道但不确定时，
    调用此工具来搜索记忆。
  args:
    query: |
      搜索关键词或问题（string，必填）。
      用自然语言描述你想回忆的事情，例如：'用户喜欢什么' 或 '上次约定的活动时间'。
  notes: >
    搜索是模糊匹配，不需要完全精确的关键词。
    如果搜索不到结果，诚实地告诉用户'我没有相关记忆'。

clear_all_memory:
  description: >
    清空指定知识库中的所有记忆条目。
    这是一个危险操作，会删除所有记住的信息！
  trigger: |
    仅在以下极端情况下使用：
      1. 知识库出现严重错误，需要全部重置
      2. 管理员明确要求清空
      3. 出现隐私相关问题需要清除
  args:
    confirm: |
      确认标志（boolean，必填）。
      必须传入 true 才能执行清空操作，这是防止误操作的安全机制。
  notes: >
    【警告】此操作不可逆！清空后无法恢复。
    调用前必须确认管理员或用户明确要求这样做。

delete_memory:
  description: >
    删除知识库中的单条记忆。
    用于移除错误的或过时的记忆条目。
  trigger: >
    当你发现某条记忆是错误的，过时的，或者用户要求删除特定信息时。
  args:
    doc_id: |
      要删除的记忆条目ID（string，必填）。
      这个ID需要从 recall_memories 或 list_memories 的返回结果中获取。
  notes: >
    删除操作也是不可逆的，请谨慎确认后再执行。

# ==============================================================
# 统一认知记忆工具（推荐使用）
# ==============================================================

upsert_cognitive_memory:
  description: >
    【推荐使用】统一的认知记忆存储工具。
    这是最常用的记忆工具，根据 category 自动分发到对应的存储系统。
    只需调用这一个工具，就能存储各种类型的记忆。
  trigger: |
    当你在对话中发现任何需要永久记住的信息时，使用此工具。
    具体场景包括：
      - 用户透露自己的兴趣爱好
      - 用户提到自己的性格特点
      - 群聊中约定活动时间或规则
      - 发现值得记住的重要事实
  args:
    category: |
      记忆分类（string，必填）。
      告诉系统这条记忆属于什么类型，以便正确存储和检索。
      可选值：
        - user_profile: 用户画像/印象（关于这个人的一切）
        - user_preference: 用户偏好（喜欢/讨厌什么）
        - group_rule: 群规/群共识/约定
        - general_fact: 一般性事实/知识
    entity: |
      关联实体（string，必填）。
      这条记忆关联的主体是谁/哪个群。
      例如：用户ID（当 category 是 user_profile 时）、群号（当 category 是 group_rule 时）、
      或通用标识'通用'（当 category 是 general_fact 时）。
    content: |
      要记忆的内容（string，必填）。
      用精简的纯文本描述要记住的信息。
      建议格式：'主体 + 动作/特征 + 描述'，例如：'张三喜欢看科幻电影'。
  notes: >
    这是推荐的主要记忆工具，大部分记忆场景都适用。
    会自动处理存储位置，你只需要提供信息内容。
    私聊场景仅支持记录当前会话用户，不要在私聊里写入其他人的画像或偏好。

# ==============================================================
# 工具管理工具
# ==============================================================

list_tools:
  description: >
    列出当前所有已注册的工具及其激活状态。
    帮助你了解有哪些工具可以使用，以及哪些工具当前可用。
  notes: >
    这是一个只读查询工具，不会修改任何状态。

toggle_tool:
  description: >
    动态激活或停用某个工具。
    可以控制其他工具是否可用。
  trigger: >
    当你发现某个工具功能异常，或者需要临时禁用某些工具时。
  args:
    tool_name: |
      工具名称（string，必填）。
      要切换状态的工具名称，可以从 list_tools 获取可用名称。
    enable: |
      启用标志（boolean，必填）。
      True 表示激活（启用）工具，False 表示停用（禁用）工具。
  notes: >
    部分核心工具被保护，不允许停用。
    停用只是临时状态，重启插件后会恢复。

# ==============================================================
# 元编程工具（高级功能）
# ==============================================================

get_plugin_source:
  description: >
    Level 4: 元编程功能。
    读取本插件的源代码，以便进行自我分析或修改请求。
    这是非常高级的功能，允许你'照镜子'看自己的代码实现。
  trigger: >
    当你需要了解自己的具体实现细节，或者需要基于代码状态提出修改建议时。
  args:
    mod_name: |
      模块名（string，可选，默认 'main'）。
      指定要读取的代码模块。
      可选值：main, dao, eavesdropping, meta_infra, memory, persona 等。
  notes: >
    【高权限】此工具仅供分析使用，不建议基于源码内容做决策。

update_plugin_source:
  description: >
    Level 4: 元编程功能。
    针对本插件提出代码修改建议，这是自我进化的核心技术。
  trigger: >
    当你认为需要修改自身代码来实现某种功能或修复问题时。
    这是最强大的自我修改能力，请谨慎使用。
  args:
    new_code: |
      全新的、完整的 Python 代码字符串（string，必填）。
      这是你要替换进去的完整代码，必须是语法正确的 Python 代码。
    description: |
      修改理由（string，必填）。
      清晰说明为什么要修改代码，这会作为修改记录保存。
    target_file: |
      目标文件名（string，可选，默认 'main.py'）。
      指定要修改的文件。
  notes: >
    【最高权限】这是你能够修改自身代码的唯一方式。
    修改需要谨慎，错误的代码可能导致插件崩溃。
    建议先使用 get_plugin_source 了解现有代码结构。

# ==============================================================
# 用户画像工具
# ==============================================================

get_user_profile:
  description: >
    获取当前用户的画像信息，了解用户的兴趣和性格特征。
    这是你了解用户的主要方式，群聊和私聊都可以使用。
  trigger: |
    当你需要了解当前对话用户的特点时，例如：
      - 首次与用户对话，想知道ta是谁
      - 用户提到过去的事情，你想确认细节
      - 想根据用户特点调整回复风格
  notes: >
    建议优先调用此工具获取用户画像，再决定是否需要调用 get_user_messages 获取历史消息。
    如果用户暂无画像，会返回提示信息。
    私聊场景会读取当前会话用户的私聊画像。

# ==============================================================
# 用户消息工具
# ==============================================================

get_user_messages:
  description: >
    获取用户的历史消息记录，用于分析用户行为模式。
    这是你了解用户过去发言历史的途径，群聊和私聊都可以使用。
  trigger: |
    当你需要了解用户的更多历史发言时，例如：
      - 用户画像信息不足，想看更多历史
      - 用户提到过去说过的话，你想验证
      - 分析用户的行为习惯
  args:
    target_user_id: |
      目标用户ID（string，可选，不填则获取当前用户）。
      指定要查询的用户ID。
    limit: |
      获取消息数量（number，可选，默认 100，最大 1000）。
      指定要获取的历史消息条数。
  notes: >
    出于性能和隐私考虑，最多显示 20 条消息内容。
    如果用户没有历史记录，会返回提示信息。
    私聊场景仅支持查询当前会话用户的历史消息。

# ==============================================================
# 表情包工具
# ==============================================================

list_stickers:
  description: >
    列出可用的表情包（全局）。
    帮助你找到可以发送的表情包。
  trigger: >
    当你想发送表情包但不确定有哪些可用时。
  args:
    tags: |
      标签筛选（string，可选）。
      按标签筛选表情包，例如：'搞笑'、'表情包'、'可爱'。
      不填则列出所有表情包。
    limit: |
      返回数量（int，可选，默认 10，最大 50）。
      指定最多返回多少个表情包。
  notes: >
    返回的是表情包的 UUID 和标签信息，不是图片本身。
    发送图片需要使用 send_sticker 工具。

send_sticker:
  description: >
    在聊天中随机发送一个表情包。
    适合在聊天时顺手发表情包来增加互动趣味。
  trigger: |
    当你想用表情包来：
      - 回应用户的消息
      - 表达情绪
      - 增加对话趣味性
      - 安慰或鼓励用户
  args: {}
  notes: >
    此功能仅限群聊使用。
    会从可用表情包中随机选一张发送。
    如需精确管理某个表情包，请使用管理员命令 /sticker preview <uuid>
