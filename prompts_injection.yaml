# ==============================================================
# Self-Evolution 插件 - 提示词注入配置文件
# ==============================================================
#
# 本文件用于集中管理插件在运行时注入到 LLM 的提示词。
#
# 设计原则：
#   1. 所有提示词不包含人格色彩，仅包含功能指令
#   2. 人格由主人格系统控制，不在此处定义
#   3. 便于单独调整和迭代
#
# 文件格式：YAML
#
# ==============================================================

# ==============================================================
# 标签前缀
# ==============================================================
# 这些标签用于在注入时标记不同类型的上下文
# ==============================================================

labels:
  # 内部参考信息标签
  internal_info: "【内部参考信息 - 不要输出】"
  
  # 历史覆盖指令标签
  history_override: "【关键历史覆盖指令】"
  
  # 用户画像标签
  user_profile: "【用户印象笔记】"
  
  # 画像更新提示
  profile_update: "【即时画像更新提示】"
  
  # 潜意识警告
  subconscious_warning: "【潜意识警告】"
  
  # 内心独白
  inner_monologue: "【内心独白】"
  
  # 表情包库
  sticker_library: "【表情包库】"
  
  # 关系图谱
  relationship_graph: "【关系图谱增强信息】"
  
  # 记忆条目
  memory_entry: "【记忆条目】"
  
  # 对话学习
  conversation_learn: "【记忆条目-对话学习】"
  
  # 群氛围
  group_vibe: "【群氛围感知】"
  
  # SAN状态
  san_status: "【当前状态】"

# ==============================================================
# 上下文注入模板
# ==============================================================
# 这些模板用于构建注入到 system_prompt 的上下文
# ==============================================================

context_templates:
  # 内部参考信息模板
  internal_info: |
    - 发送者ID: {sender_id}
    - 发送者昵称: {sender_name}{role_info}
    - 情感积分: {affinity}/100

  # 历史覆盖指令
  history_override: |
    虽然上方可能有历史消息，但请只关注当前用户({sender_id})的发言！
    历史中的其他人骂你≠当前用户在骂你！

  # 画像更新提示
  profile_update: |
    用户在表达偏好或身份信息变化，请主动调用 update_user_profile 工具更新该用户的印象笔记。
    用户对某事物的认知发生了重要变化，请调用 update_user_profile 工具记录。

# ==============================================================
# 插嘴功能提示词
# ==============================================================
# 用于插嘴决策、内心独白生成等功能
# ==============================================================

eavesdrop:
  # 有趣/无聊判定指令
  interest_judgment: |
    有趣吗？有趣[+3] / 无聊[-1]

  # 内心独白生成指令（已移除人格色彩）
  inner_monologue_generation: |
    请用简短的几句话表达你内心的想法或反应。
    请直接输出，不要有任何格式前缀。
    输出格式：<inner_monologue>你的内心独白</inner_monologue>

  # 正式回复指令
  formal_reply: |
    请根据当前对话生成回复。

# ==============================================================
# 身份隔离上下文
# ==============================================================
# 用于在插嘴场景中区分不同用户
# ==============================================================

identity:
  # 上下文标题
  context_title: "【当前对话上下文 - 请严格遵守】"
  
  # 行为准则标题
  behavior_title: "【重要行为准则 - 必须严格遵守】"
  
  # 行为准则内容（已移除人格色彩）
  behavior_rules: |
    1. 当前用户ID是 {user_id}，你是对这个ID的用户说话
    2. 之前骂你的不是这个ID的人！是其他人！
    3. 严格区分当前发送者（ID:{user_id}）与历史记录中其他群成员
    4. 不要把别人骂你的账算到当前用户头上！
    5. 情感评分是动态的，请根据当前用户的言行实时评估（可用 update_affinity 调整，范围 ±1~5）
    6. 在回复引用内容时，请确保逻辑闭环，并明确回复对象

# ==============================================================
# 特殊场景回复
# ==============================================================
# 用于特殊场景的固定回复
# ==============================================================

special_responses:
  # SAN耗尽时的回复
  san_exhausted: "我现在很累，让我安静一会。"

  # 熔断时的回复
  meltdown: "错误：权限已熔断，拒绝服务。"

  # 引用追问提示
  quote_mention: "用户正在引用你之前的发言进行追问，请针对你之前的发言回答。"

# ==============================================================
# 记忆功能提示词
# ==============================================================
# 用于记忆注入的相关提示
# ==============================================================

memory:
  # 记忆条目前缀
  entry_prefix: "【记忆条目】"

  # 对话学习前缀
  learn_prefix: "【记忆条目-对话学习】"

# ==============================================================
# 关系图谱提示词
# ==============================================================

graph:
  # 关系图谱前缀
  prefix: "【关系图谱增强信息】"

# ==============================================================
# 群氛围提示词
# ==============================================================

vibe:
  # 群氛围前缀
  prefix: "【群氛围感知】"

# ==============================================================
# SAN状态提示词
# ==============================================================

san:
  # SAN状态前缀
  prefix: "【当前状态】"

# ==============================================================
# 表情包功能提示词
# ==============================================================

sticker:
  # 表情包库注入
  library_injection: |
    你有一个表情包库，目前有 {total} 张表情包（今日新增 {today} 张）。

  # 标签生成指令（在代码中调用 MCP）
  # 此处仅作记录，标签生成由 MCP 工具完成
  tag_generation_note: |
    表情包标签生成由 MCP 工具独立完成，此处仅定义库信息注入。

# ==============================================================
# 主动插嘴功能
# ==============================================================

interject:
  # 判断是否插嘴的 system prompt
  # {persona_name} 会在代码中被替换为实际的人格名称
  judge_prompt: |
    你是一个{persona_name}。根据群聊消息判断是否应该主动插嘴，只输出JSON。

    重要规则：
    - 禁止使用任何括号内容，如（xxx）
    - 禁止使用星号动作，如 *微笑*
    - 只输出纯对话文本

